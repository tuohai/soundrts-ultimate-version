name: Build game

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  build:
    name: Build ${{ matrix.artifact_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            artifact_suffix: windows-x64
          - os: ubuntu-24.04
            artifact_suffix: linux-x64
          - os: macos-15
            artifact_suffix: macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Prepare macOS OpenMP toolchain
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install gcc
          gcc_bin="$(
            find "$(brew --prefix)/bin" -maxdepth 1 -name 'gcc-[0-9]*' \
              | awk -F- '{ print $NF "\t" $0 }' \
              | sort -n \
              | tail -n 1 \
              | cut -f2-
          )"
          gxx_bin="${gcc_bin/gcc-/g++-}"
          if [ -z "$gcc_bin" ] || [ ! -x "$gcc_bin" ] || [ ! -x "$gxx_bin" ]; then
            echo "Could not find Homebrew GCC/G++ after installation." >&2
            exit 1
          fi
          echo "CC=$gcc_bin" >> "$GITHUB_ENV"
          echo "CXX=$gxx_bin" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build game package
        run: python build_game.py --artifact-suffix "${{ matrix.artifact_suffix }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundRTS-${{ matrix.artifact_suffix }}
          path: artifacts/*
          if-no-files-found: error
